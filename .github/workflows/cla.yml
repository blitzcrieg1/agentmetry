name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: read
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >
          github.event_name == 'pull_request_target' ||
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
          )
        uses: contributor-assistant/github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/blitzcrieg1/agentmetry/blob/master/CLA.md"
          branch: "cla-signatures"
          allowlist: dependabot[bot],greenkeeper[bot]
          custom-notsigned-prcomment: >
            Thank you for your submission. Before we can merge, please sign our
            [Contributor License Agreement (CLA v1.0)](https://github.com/blitzcrieg1/agentmetry/blob/master/CLA.md)
            by replying to this comment with exactly:
            **"I have read the CLA Document and I hereby sign the CLA"**
            Corporate contributors: see [CCLA.md](https://github.com/blitzcrieg1/agentmetry/blob/master/CCLA.md).
