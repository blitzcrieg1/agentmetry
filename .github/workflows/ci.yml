name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install orchestrator
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check core api tests
      - name: Run tests
        run: pytest -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard
        run: npm ci
      - name: Lint dashboard
        run: npm run lint
      - name: Build dashboard
        run: npm run build
