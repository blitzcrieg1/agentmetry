version: "1.0"
rules:
  - id: "aws_access_key"
    name: "AWS Access Key ID"
    description: "Detects standard AWS access key IDs"
    pattern: "(?i)\\b((?:AKIA|ABIA|ACCA|ASIA)[0-9A-Z]{16})\\b"
    category: "credentials"
    severity: "critical"

  - id: "aws_secret_key"
    name: "AWS Secret Access Key"
    description: "Detects standard AWS secret access keys"
    pattern: "(?i)\\b([a-zA-Z0-9+/]{40})\\b"
    category: "credentials"
    severity: "critical"

  - id: "github_pat"
    name: "GitHub Personal Access Token"
    description: "Detects GitHub PATs (ghp, gho, ghu, ghs, ghb)"
    pattern: "(?i)\\b(gh[pousb]_[a-zA-Z0-9]{36})\\b"
    category: "credentials"
    severity: "critical"

  - id: "slack_token"
    name: "Slack Token"
    description: "Detects Slack bot/user/app tokens"
    pattern: "(?i)\\b(xox[pbo]-[a-zA-Z0-9-]{10,})\\b"
    category: "credentials"
    severity: "critical"

  - id: "bearer_token"
    name: "Authorization Bearer Token"
    description: "Detects Bearer tokens in Authorization headers"
    pattern: "(?i)bearer\\s+[a-z0-9._~+/-]{20,}=*"
    category: "credentials"
    severity: "critical"

  - id: "private_key"
    name: "Private Key Block"
    description: "Detects PEM private key material (RSA/EC/OpenSSH/PGP)"
    pattern: "-----BEGIN (?:RSA |EC |OPENSSH |PGP |DSA )?PRIVATE KEY-----"
    category: "credentials"
    severity: "critical"

  - id: "us_ssn"
    name: "US Social Security Number"
    description: "Detects standard US SSN format"
    pattern: "\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b"
    category: "pii"
    severity: "high"
