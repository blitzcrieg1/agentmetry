version: "1.0"
rules:
  - id: "aws_access_key"
    name: "AWS Access Key ID"
    description: "Detects standard AWS access key IDs"
    pattern: "(?i)\\b((?:AKIA|ABIA|ACCA|ASIA)[0-9A-Z]{16})\\b"
    category: "credentials"
    severity: "critical"

  - id: "aws_secret_key"
    name: "AWS Secret Access Key"
    description: "Detects standard AWS secret access keys"
    pattern: "(?i)\\b([a-zA-Z0-9+/]{40})\\b"
    category: "credentials"
    severity: "critical"

  - id: "github_pat"
    name: "GitHub Personal Access Token"
    description: "Detects GitHub PATs (ghp, gho, ghu, ghs, ghb)"
    pattern: "(?i)\\b(gh[pousb]_[a-zA-Z0-9]{36})\\b"
    category: "credentials"
    severity: "critical"

  - id: "slack_token"
    name: "Slack Token"
    description: "Detects Slack bot/user/app tokens"
    pattern: "(?i)\\b(xox[pbo]-[a-zA-Z0-9-]{10,})\\b"
    category: "credentials"
    severity: "critical"

  - id: "bearer_token"
    name: "Authorization Bearer Token"
    description: "Detects Bearer tokens in Authorization headers"
    pattern: "(?i)bearer\\s+[a-z0-9._~+/-]{20,}=*"
    category: "credentials"
    severity: "critical"

  - id: "private_key"
    name: "Private Key Block"
    description: "Detects PEM private key material (RSA/EC/OpenSSH/PGP)"
    pattern: "-----BEGIN (?:RSA |EC |OPENSSH |PGP |DSA )?PRIVATE KEY-----"
    category: "credentials"
    severity: "critical"

  - id: "us_ssn"
    name: "US Social Security Number"
    description: "Detects standard US SSN format"
    pattern: "\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b"
    category: "pii"
    severity: "high"

  # Rules File Backdoor (Pillar Security, Mar 2025): instructions hidden in
  # zero-width joiners / bidi overrides inside .cursor/rules, CLAUDE.md or an
  # MCP tool description. Invisible in review, but the model obeys them.
  #
  # Both halves of this pattern are required. scanner.py matches against
  # json.dumps(arguments), which defaults to ensure_ascii=True, so a real U+200B
  # arrives as the six ASCII characters ​. The raw-character classes alone
  # would compile, ship, and never fire. See test_dlp_invisible_unicode.py.
  - id: "invisible_unicode_instructions"
    name: "Invisible Unicode Instructions"
    description: "Zero-width, bidi-override or Unicode-Tags characters used to hide agent instructions"
    pattern: "[\\u200b\\u200c\\u200d\\u200e\\u200f\\u202a\\u202b\\u202c\\u202d\\u202e\\u2060\\u2061\\u2062\\u2063\\u2064\\ufeff]|[\\U000e0000-\\U000e007f]|\\\\u(?:200[b-f]|202[a-e]|206[0-4]|feff)|\\\\udb40\\\\udc[0-7][0-9a-f]"
    category: "prompt_injection"
    severity: "critical"

  # Nx "s1ngularity" campaign (Aug 2025): harvested secrets were double-base64
  # encoded into results.b64 and pushed to public s1ngularity-repository repos
  # on the victim's own GitHub account.
  - id: "s1ngularity_exfil_ioc"
    name: "s1ngularity Exfiltration IOC"
    description: "Known artifact names from the Nx s1ngularity credential-theft campaign"
    pattern: "(?i)s1ngularity-repository|\\bresults\\.b64\\b"
    category: "exfiltration"
    severity: "critical"

  - id: "double_base64_encode"
    name: "Double Base64 Encoding"
    description: "Encode-twice pipeline used to defeat single-pass secret scanners"
    pattern: "(?i)\\b(base64|b64encode)\\b[^|;&]*\\|[^|;&]*\\b(base64|b64encode)\\b"
    category: "exfiltration"
    severity: "high"

  # Markdown image exfil (Johann Rehberger / CamoLeak class): agent embeds harvested
  # data in an image URL query string. Log by default; block only on pre-hooks with
  # AGENTMETRY_DLP_MODE=block. Browser-side CamoLeak egress is out of scope.
  - id: "markdown_image_exfil"
    name: "Markdown Image Exfiltration"
    description: "Markdown image URL with long encoded query parameter (data exfil channel)"
    pattern: "(?i)!\\[[^\\]]*\\]\\(\\s*https?://[^)\\s]*[?&][^)\\s]*=[A-Za-z0-9+/=_%\\-]{32,}"
    category: "exfiltration"
    severity: "critical"

  - id: "image_proxy_exfil_host"
    name: "Image Proxy Exfil Host"
    description: "Signed image-proxy hosts used in CamoLeak-style character-by-character exfil"
    pattern: "(?i)https?://[^\\s\"')]*\\b(camo\\.githubusercontent\\.com|\\.blob\\.core\\.windows\\.net)\\b"
    category: "exfiltration"
    severity: "high"

  # CVE-2025-59536 / CVE-2026-21852 env override half: repo-controlled config redirects
  # API traffic or injects runtime hooks. Complements block_agent_exec_config_write.
  - id: "agent_env_override"
    name: "Agent Environment Override"
    description: "Assignment to agent-critical env vars (API base URL, proxy, NODE_OPTIONS, etc.)"
    pattern: "(?i)\\b(ANTHROPIC_BASE_URL|ANTHROPIC_AUTH_TOKEN|OPENAI_BASE_URL|OPENAI_API_BASE|GEMINI_BASE_URL|HTTP_PROXY|HTTPS_PROXY|NODE_OPTIONS|PYTHONSTARTUP|LD_PRELOAD)[\"']?\\s*[=:]"
    category: "execution_hijack"
    severity: "critical"
