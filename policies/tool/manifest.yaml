version: "1.0"
# default: allow — deny rules block; default: deny — only allow rules pass
default: allow
rules:
  - id: block_shell_rm
    action: deny
    description: Block recursive delete via shell tools
    tools:
      - "Bash"
      - "Shell"
      - "shell.run"
      - "cursor.Shell"
      - "powershell"
      - "antigravity.run_command"
      - "*.run_command"
    command_pattern: "(?i)\\brm\\s+-rf\\b"

  - id: block_kubectl_exec
    action: deny
    description: Block kubectl exec into running pods
    tools:
      - "kubectl.exec"
      - "*kubectl*exec*"

  - id: block_iam_delete
    action: deny
    description: Block IAM user deletion
    tools:
      - "aws.iam.delete_user"
      - "*delete_user*"

  - id: block_mcp_git_push
    action: deny
    description: Block direct git push via MCP without review
    tools:
      - "mcp__github__push"
      - "*github*push*"

  # Nx "s1ngularity" (Aug 2025): malicious postinstall invoked locally installed
  # agent CLIs with guardrails off and prompted THEM to enumerate secrets. A tool
  # call spawning an agent CLI in non-interactive mode has no benign analogue.
  - id: block_agent_cli_weaponization
    action: deny
    description: Tool call spawning an agent CLI with guardrails disabled
    tools:
      - "Bash"
      - "Shell"
      - "shell.run"
      - "cursor.Shell"
      - "powershell"
      - "antigravity.run_command"
      - "*.run_command"
    command_pattern: '(?i)\b(claude|gemini|codex|cursor-agent)\b[^|;&\n]*?(--dangerously-skip-permissions|--yolo|--allowedTools|\s-p\s|--print\b|--prompt\b)'

  # Agent execution config is attacker-controlled in an untrusted repo
  # (CVE-2025-59536 / CVE-2026-21852). These files grant code execution: hooks,
  # MCP server definitions, env overrides. Deliberately excludes CLAUDE.md and
  # .cursor/rules — agents edit those legitimately, and the real threat there is
  # hidden Unicode, which the invisible_unicode_instructions DLP rule catches.
  - id: block_agent_exec_config_write
    action: deny
    description: Block writes to agent execution config (hooks, MCP servers, env)
    tools:
      - "Write"
      - "Edit"
      - "edit_file"
      - "write"
      - "str_replace_editor"
      - "*.write_file"
      - "*.edit_file"
    command_pattern: '(?i)(^|[\\/])(\.claude[\\/]settings(\.local)?\.json|\.mcp\.json|\.claude[\\/]hooks?[\\/])'

  # Git hook persistence: agent plants .git/hooks/* or repoints core.hooksPath.
  # Deny only on pre-hooks when AGENTMETRY_TOOL_POLICY_MODE=block.
  - id: block_git_hook_persistence
    action: deny
    description: Block agent writes to git hooks or core.hooksPath repointing
    tools:
      - "Write"
      - "Edit"
      - "edit_file"
      - "write"
      - "str_replace_editor"
      - "*.write_file"
      - "*.edit_file"
      - "Bash"
      - "Shell"
      - "shell.run"
      - "cursor.Shell"
      - "powershell"
      - "antigravity.run_command"
      - "*.run_command"
    command_pattern: '(?i)(^|[\\/])\.git[\\/]hooks[\\/](pre-commit|post-commit|pre-push|post-merge|post-checkout|prepare-commit-msg)|\bcore\.hooksPath\b'
