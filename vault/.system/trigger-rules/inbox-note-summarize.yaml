id: inbox-note-summarize
type: vault_watch
enabled: true
skill: summarize_note
cooldown_seconds: 300
match:
  path_glob: "00-Inbox/*.md"
  frontmatter:
    # Meeting notes are claimed by the more specific inbox-meeting-summarize rule.
    not_tags:
      - meeting
# summarize_note's vault_fs.read_note tool expects the bare vault-relative path.
user_input_template: "{{ trigger.file_path }}"
