id: inbox-meeting-summarize
type: vault_watch
enabled: true
skill: summarize_meeting
cooldown_seconds: 120
match:
  path_glob: "00-Inbox/*.md"
  frontmatter:
    tags:
      - meeting
user_input_template: |
  Summarize the meeting note at {{ trigger.file_path }}.
  Extract decisions, action items, and owners. Archive when complete.
