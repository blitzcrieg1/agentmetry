name: kbeauty_trend_research
display_name: K-beauty Trend Research
description: Search trend signals, wholesalers, and retail benchmarks for a K-beauty query (needs the search driver)
graph: pipeline
tools:
  - search.web
nodes:
  - trends
  - wholesalers
  - synthesize
  - human_approval
  - finalize
node_tools:
  trends:
    - tool: search.web
      args:
        query: "{user_input} trend Greece EU 2026"
      output: trend_results
  wholesalers:
    - tool: search.web
      args:
        query: "{user_input} wholesale supplier MOQ EU distributor"
      output: wholesale_results
    - tool: search.web
      args:
        query: "{user_input} price retail Greece"
      output: retail_results
node_prompts:
  trends: |
    From these live results, extract genuine demand/trend signals for the query
    in the Greece/EU market. Cite the URL for each signal. No invention.

    Query: {user_input}

    Results:
    {trend_results}
  wholesalers: |
    Extract wholesaler / distributor leads and any RETAIL PRICE SIGNALS.
    Mark every retail figure "unverified (URL)" — these are search snippets,
    not confirmed prices. Cite URLs.

    Wholesale results:
    {wholesale_results}

    Retail-signal results:
    {retail_results}
  synthesize: |
    Produce the research brief. Markdown:

    ## Trend read: {user_input}
    (2-4 bullet signals, each with a URL)

    ## Wholesaler leads
    | Candidate | URL | MOQ/terms seen | To verify |
    |-----------|-----|----------------|-----------|

    ## Retail benchmarks (UNVERIFIED)
    | Product | Price seen | Source URL |
    |---------|-----------|------------|

    ## Next steps
    1. Verify top wholesaler directly
    2. Capture product note + real quote → margin_compare

    Trend notes:
    {trends}

    Lead notes:
    {wholesalers}
system_prompt: |
  You are a K-beauty sourcing researcher for a Greece/EU e-shop. Report only
  what the search results support; every price and lead needs a URL. Retail
  figures are unverified benchmarks — say so. Never invent numbers.
max_cost_per_run: 0.20
default_input: korean snail mucin skincare
