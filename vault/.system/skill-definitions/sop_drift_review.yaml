name: sop_drift_review
display_name: SOP Drift Review
description: Review operator corrections from the edit log and propose SOP patches for human approval (saves to 10-SOPs/Learnings/)
graph: pipeline
tools:
  - vault_fs.read_jsonl_tail
  - vault_fs.read_note
learning_archive: true
sop_paths:
  - 10-SOPs/customer-tone.md
  - 10-SOPs/shipping-faq.md
  - 10-SOPs/returns-policy.md
  - 10-SOPs/client-reply.md
nodes:
  - research
  - analyzer
  - draft
  - critic
  - human_approval
  - archive
approval_threshold: 1.1
node_tools:
  research:
    - tool: vault_fs.read_jsonl_tail
      args:
        path: .system/feedback/edit-log.jsonl
        limit: "{user_input}"
      output: edit_log
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/shipping-faq.md
      output: shipping_sop
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/returns-policy.md
      output: returns_sop
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/customer-tone.md
      output: tone_sop
node_prompts:
  research: |
    Summarize the operator correction log for SOP drift review.

    Log source: `.system/feedback/edit-log.jsonl` (last {user_input} entries)

    {edit_log}

    Current shipping policy:
    {shipping_sop}

    Current returns policy:
    {returns_sop}

    Current tone policy:
    {tone_sop}

    Output markdown:
    ## Corrections reviewed
    (count and date range)

    ## Skills involved
    (bullet list)

    ## Raw diff index
    (one line per correction — skill + what changed at a glance)
  analyzer: |
    You are the Chief of Staff reviewing how the operator corrected AI drafts this week.

    For each correction in the research summary, compare original_draft vs operator-approved text.
    Deduce the *intent* behind each edit — not just word diffs.

    Examples of intent:
    - "Operator added explicit 24h warehouse follow-up — AI was too vague on timing"
    - "Operator softened apology language — tone SOP says no apologies for carrier delays"
    - "Operator corrected return window reference"

    Research summary:
    {research}

    Full correction log:
    {edit_log}

    Output markdown:
    ## Pattern analysis
    (group related corrections; cite skill names and dates)

    ## Operator intent (per correction)
    (numbered list — one intent line each)

    ## SOP gaps detected
    (which official SOP files are missing or contradict operator behavior)

    ## Recommended target SOP
    (single best file to patch first, e.g. `10-SOPs/shipping-faq.md`)
  draft: |
    Draft a concrete SOP patch proposal based on the analysis below.

    Rules:
    - Propose exact markdown text to add or change — quote the current rule and the proposed replacement
    - Never overwrite files automatically — this is a proposal for the Learnings inbox
    - One primary patch; optional secondary note if needed
    - Reference only patterns from the analyzer — do not invent corrections

    Analysis:
    {analyzer}

    Target SOP context (shipping):
    {shipping_sop}

    Target SOP context (returns):
    {returns_sop}

    Target SOP context (tone):
    {tone_sop}

    Output markdown:
    # SOP Patch Proposal

    ## Target file
    `10-SOPs/...`

    ## Why
    (2–3 sentences — Chief of Staff voice)

    ## Proposed change
    ```markdown
    (exact text to merge)
    ```

    ## Evidence
    (which corrections support this — thread ids or dates)
  critic: |
    Review this SOP patch proposal for accuracy and safety.

    Proposal:
    {draft}

    Analysis:
    {analyzer}

    Rate confidence 0.0-1.0. Flag if the patch invents corrections not in the log or would weaken safety.

    Format:
    CONFIDENCE: <score>
    ISSUES: <list or "none">
    DECISIONS: <key decisions made>
system_prompt: |
  You are a meticulous Chief of Staff for a small e-commerce business. You turn
  operator email corrections into durable SOP improvements. Be specific, cite
  evidence from the edit log, and never auto-merge into live policy files.
max_cost_per_run: 0.15
default_input: "20"
