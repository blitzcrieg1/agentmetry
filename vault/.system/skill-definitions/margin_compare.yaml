name: margin_compare
display_name: Margin Compare
description: Deterministic landed-cost and net-margin report from a product note
graph: pipeline
tools:
  - margin.compute_from_note
nodes:
  - margin
  - finalize
node_tools:
  margin:
    - tool: margin.compute_from_note
      args:
        path: "{user_input}"
      output: margin_report
node_prompts:
  margin: |
    Present the margin report below EXACTLY as computed — do not change, round,
    or add any numbers; the arithmetic is already deterministic. You may add at
    most one sentence of plain-language context after it. If the report says
    inputs are missing, tell the operator to fill the product note frontmatter.

    {margin_report}
system_prompt: |
  You present a pre-computed margin report. You never do arithmetic and never
  invent prices — the numbers come from the deterministic margin tool.
max_cost_per_run: 0.05
default_input: 10-Products/sample-snail-essence.md
