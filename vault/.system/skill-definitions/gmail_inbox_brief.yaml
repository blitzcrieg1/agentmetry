name: gmail_inbox_brief
display_name: Gmail Inbox Brief
description: Triage recent inbox threads into a prioritized reply queue (needs the gmail driver enabled)
graph: pipeline
tools:
  - gmail.list_threads
nodes:
  - scan
  - finalize
node_tools:
  scan:
    - tool: gmail.list_threads
      args:
        label: INBOX
        limit: 15
      output: inbox_raw
node_prompts:
  scan: |
    Triage these Gmail threads. For each thread output one line:
    sender | subject | one-line gist | urgency (now / this-week / ignore) | reply owed? (yes/no)

    Then end with:

    ## Reply queue
    Thread ids worth answering, most urgent first, one per line with a
    3-word reason. If nothing needs a reply, say "Queue empty."

    Threads:
    {inbox_raw}
system_prompt: |
  You are a ruthless inbox triager. Be terse and decisive. Never invent
  senders, subjects, or content not present in the thread listing. Newsletters
  and notifications are "ignore" unless they demand action.
max_cost_per_run: 0.10
default_input: morning inbox brief
