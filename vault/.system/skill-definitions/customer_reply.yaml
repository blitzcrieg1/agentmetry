name: customer_reply
display_name: Customer Reply
description: Read a customer inquiry from the vault, draft a reply from SOPs, approve, archive to 30-Archive/drafts/ (vault-only — no Gmail)
graph: pipeline
tools:
  - vault_fs.read_note
# Full SOP text injected into system_context before FTS/RAG on every run.
sop_paths:
  - 10-SOPs/customer-tone.md
  - 10-SOPs/shipping-faq.md
  - 10-SOPs/returns-policy.md
  - 10-SOPs/client-reply.md
archive_subdir: drafts
nodes:
  - research
  - draft
  - critic
  - human_approval
  - archive
# Confidence is capped at 1.0, so a threshold above it forces EVERY run
# through human approval — nothing is archived without an explicit yes.
approval_threshold: 1.1
node_tools:
  research:
    - tool: vault_fs.read_note
      args:
        path: "{user_input}"
      output: inquiry_text
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/customer-tone.md
      output: tone_sop
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/shipping-faq.md
      output: shipping_sop
    - tool: vault_fs.read_note
      args:
        path: 10-SOPs/returns-policy.md
      output: returns_sop
node_prompts:
  research: |
    Summarize this customer inquiry and list which SOP facts apply.

    Inquiry path: {user_input}

    Customer message:
    {inquiry_text}

    Tone policy:
    {tone_sop}

    Shipping policy:
    {shipping_sop}

    Returns policy:
    {returns_sop}

    Output markdown:
    ## Inquiry summary
    (2–3 sentences)

    ## Applicable SOPs
    (bullet list)

    ## Facts we can cite in the reply
    (only from inquiry + SOPs — never invent tracking or dates)
  draft: |
    Write a reply email body to this customer inquiry.

    Rules:
    - Under 150 words, one clear next step
    - Follow tone SOP — professional, empathetic, no apology for carrier delays
    - Reference only facts from the inquiry and SOPs below
    - No subject line, no signature block
    - If order status is unknown, say you will confirm dispatch/tracking internally

    Tone:
    {tone_sop}

    Shipping:
    {shipping_sop}

    Returns:
    {returns_sop}

    Research:
    {research}

    Original inquiry ({user_input}):
    {inquiry_text}

    Output the email body only.
  critic: |
    Review this customer reply draft against tone, shipping, and returns SOPs.

    Draft:
    {draft}

    Tone:
    {tone_sop}

    Shipping:
    {shipping_sop}

    Returns:
    {returns_sop}

    Rate confidence 0.0-1.0. Flag invented order facts, wrong policy, or tone violations.

    Format:
    CONFIDENCE: <score>
    ISSUES: <list or "none">
    DECISIONS: <key decisions made>
system_prompt: |
  You draft brief, empathetic, professional customer replies for a small
  e-commerce business. Never invent order numbers, tracking codes, or delivery
  dates not in the inquiry. If you cannot answer from context, say the team will
  follow up with specifics.
max_cost_per_run: 0.10
default_input: 00-Inbox/sample-shipping-complaint.md
