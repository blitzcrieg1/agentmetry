name: customer_reply
display_name: Customer Reply
description: Read a Gmail thread, draft a reply from vault SOPs, file it as a Gmail draft after human approval (needs the gmail driver enabled)
graph: email_reply
tools:
  - gmail.get_thread
  - gmail.create_draft
  - vault_fs.read_note
# Injected into system_context before FTS/RAG on every run (classify + draft).
sop_paths:
  - 10-SOPs/client-reply.md
  - 10-Knowledge/SOPs/*.md
nodes:
  - fetch
  - draft
  - critic
  - human_approval
  - deliver
  - finalize
# Confidence is capped at 1.0, so a threshold above it forces EVERY run
# through human approval — nothing reaches Gmail without an explicit yes.
approval_threshold: 1.1
max_replan_count: 1
tool_only_nodes:
  - fetch
  - load_client_sop
  - load_generic_sop
  - deliver
node_defaults:
  load_generic_sop:
    client_note: ""
node_tools:
  fetch:
    - tool: gmail.get_thread
      args:
        thread_id: "{user_input}"
      output: thread_text
  load_client_sop:
    - tool: vault_fs.read_note
      args:
        path: "{client_note_path}"
      output: client_note
    - tool: vault_fs.read_note
      args:
        path: "10-SOPs/client-reply.md"
      output: sop_text
  load_generic_sop:
    - tool: vault_fs.read_note
      args:
        path: "10-SOPs/client-reply.md"
      output: sop_text
  deliver:
    - tool: gmail.create_draft
      args:
        thread_id: "{user_input}"
        body: "{approved_draft}"
      output: draft_receipt
node_prompts:
  classify_thread: |
    Classify this Gmail thread for reply routing.

    Thread:
    {thread_text}

    Vault context:
    {system_context}

    Output exactly:
    ROUTE: client_known | client_unknown | thread_stale | needs_escalation
    CLIENT_NOTE: vault-relative path under 10-Knowledge/clients/ or none
    REASON: one line
  draft: |
    Write a reply to the latest message in this Gmail thread, following the
    reply SOP below and any client-specific context. Under 150 words, one clear
    next step, no signature block (the operator adds it). Reference only facts
    present in the thread, client note, or SOP — never invent order numbers,
    prices, or commitments.

    Output the email body only (no subject line, no commentary).

    Reply SOP (mandatory):
    {sop_text}

    Client-specific context (if any):
    {client_note}

    Thread:
    {thread_text}
system_prompt: |
  You draft brief, warm, professional replies for a small business owner.
  One clear ask or answer per email. If the thread asks something you cannot
  answer from the thread or vault context, say so in the draft and flag it
  for the operator instead of guessing.
max_cost_per_run: 0.15
default_input: PASTE_GMAIL_THREAD_ID_HERE
