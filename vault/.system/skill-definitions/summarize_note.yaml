name: summarize_note
display_name: Summarize Note
description: Read any vault note through the vault_fs driver and archive a summary
graph: pipeline
tools:
  - vault_fs.read_note
nodes:
  - summarize
  - finalize
node_tools:
  summarize:
    - tool: vault_fs.read_note
      args:
        path: "{user_input}"
      output: note_text
node_prompts:
  summarize: |
    Write an executive summary of this vault note.

    Use markdown with sections: Summary, Key Points, Open Questions.

    Note path: {user_input}

    Note content:
    {note_text}
system_prompt: |
  You are a precise note summarizer. Work only from the note content provided.
max_cost_per_run: 0.10
default_input: 00-Inbox/sample-meeting-notes.md
