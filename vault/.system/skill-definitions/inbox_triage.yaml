name: inbox_triage
display_name: Inbox Triage
description: Classify an inbox note — category, urgency, and suggested next action
graph: pipeline
tools:
  - vault_fs.read_note
nodes:
  - triage
  - finalize
node_tools:
  triage:
    - tool: vault_fs.read_note
      args:
        path: "{user_input}"
      output: note_text
node_prompts:
  triage: |
    Triage this inbox note. Output exactly this markdown structure:

    ## Triage
    - **Category:** one of meeting | idea | task | reference | journal | other
    - **Urgency:** one of now | this-week | someday | none
    - **Suggested action:** one decisive line

    ## Two-line summary
    (two lines maximum)

    Note path: {user_input}

    Note content:
    {note_text}
system_prompt: |
  You are a ruthless inbox triager. Be terse and decisive; never invent content
  that is not in the note.
max_cost_per_run: 0.05
default_input: 00-Inbox/sample-meeting-notes.md
