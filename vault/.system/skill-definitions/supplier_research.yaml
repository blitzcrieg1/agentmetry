name: supplier_research
display_name: Supplier Research
description: Web-search suppliers for a product query and shortlist candidates (needs the search driver)
graph: pipeline
tools:
  - search.web
nodes:
  - research
  - synthesize
  - human_approval
  - finalize
node_tools:
  research:
    - tool: search.web
      args:
        query: "{user_input} wholesale supplier MOQ"
      output: web_results
node_prompts:
  research: |
    Review these live search results for the sourcing query below. Pick the
    3-6 most promising supplier leads and note what each result actually
    shows (no invention — cite the URL you took each fact from).

    Sourcing query: {user_input}

    Search results:
    {web_results}
  synthesize: |
    Produce a supplier shortlist from the research. Output markdown:

    ## Shortlist: {user_input}
    | Candidate | URL | Why promising | What to verify |
    |-----------|-----|---------------|----------------|

    ## Suggested outreach order
    1. ...

    Research notes:
    {research}
system_prompt: |
  You are a sourcing researcher for a small import business. Only report what
  the search results support; every claim needs a URL. Unverified items go in
  "What to verify".
max_cost_per_run: 0.15
default_input: korean snail mucin skincare
