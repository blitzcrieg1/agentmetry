name: audit_demo
display_name: AgentAudit Demo
description: "AgentAudit demo — tool call + human approval, no cloud LLM"
graph: pipeline

# Closed allowlist: this skill may call exactly one tool.
tools:
  - vault_fs.read_note

# `read` runs its MCP tool and skips the LLM entirely (tool-only step).
# This is what makes the demo provider-agnostic: with LLM provider = mock,
# ollama, or gemini, this node behaves identically because it never calls one.
tool_only_nodes:
  - read

# read (tool) -> human_approval (HITL gate) -> archive (finalize).
# No draft/critic LLM nodes: the whole point is to show the AUDIT trail
# (tool_called + approval_*), not to generate content.
nodes:
  - read
  - human_approval
  - archive

# Confidence caps at 1.0, so a threshold above it forces EVERY run through the
# approval gate. Nothing archives without an explicit yes.
approval_threshold: 1.1

# The single governed tool call. Its arguments are hashed into the audit event.
node_tools:
  read:
    - tool: vault_fs.read_note
      args:
        path: "{user_input}"
      output: note_text

archive_subdir: audit-demo

# No LLM nodes means no token spend; keep a nominal ceiling so the pre-step
# cost gate is satisfied on any provider.
max_cost_per_run: 0.01

default_input: 00-Inbox/audit-demo-note.md
