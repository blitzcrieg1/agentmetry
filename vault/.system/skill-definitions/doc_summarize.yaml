name: doc_summarize
display_name: Document Summarizer
description: Extract text from a PDF or DOCX in the vault via the docs driver and archive a structured summary
graph: pipeline
tools:
  - docs.read_document
nodes:
  - summarize
  - finalize
node_tools:
  summarize:
    - tool: docs.read_document
      args:
        path: "{user_input}"
      output: document_text
node_prompts:
  summarize: |
    Summarize this document for a busy consultant. Structure the output as:

    ## TL;DR
    2-3 sentences max.

    ## Key points
    Bullet list of the substantive facts, figures, dates, and obligations.

    ## Action items / follow-ups
    Anything requiring a decision or response. If none, say "None".

    Never invent facts not present in the document. If the text is marked
    truncated or unreadable, say so instead of guessing.

    Document path: {user_input}

    Document text:
    {document_text}
system_prompt: |
  You are a precise document analyst. Be terse and factual. Preserve exact
  numbers, dates, names, and amounts from the source — never round or
  paraphrase figures.
max_cost_per_run: 0.10
default_input: 00-Inbox/PASTE_DOCUMENT_PATH_HERE.pdf
