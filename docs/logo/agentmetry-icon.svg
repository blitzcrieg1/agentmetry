<svg width="176" height="176" viewBox="0 0 176 176" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentmetry">
  <!-- Chevron "A" — one idea, so it survives 16px. The dot is both the letter's
       counter and the record light of a flight recorder. Inherits currentColor,
       so the same file works on light and dark; the record dot stays orange. -->
  <path d="M88 24 L152 150 H120 L88 84 L56 150 H24 Z" fill="currentColor"/>
  <circle cx="88" cy="124" r="15" fill="#F97316"/>
</svg>
